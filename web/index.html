<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Claude Usage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Plain native macOS menu/popover look (cf. the system Wi-Fi menu, or the
       "Hot" app). The window uses the system `popover` vibrancy material
       (src/main.ts), so the body is transparent and the frosted material shows
       through. Colors track the system light/dark appearance. */
    :root {
      color-scheme: light dark;
      --label: rgba(0, 0, 0, 0.88);
      --label-2: rgba(0, 0, 0, 0.52);
      --label-3: rgba(0, 0, 0, 0.32);
      --sep: rgba(0, 0, 0, 0.10);
      --hover: rgba(0, 0, 0, 0.07);
      --track: rgba(0, 0, 0, 0.09);
      --accent: #0a7aff;          /* macOS menu-selection blue */
      --on-accent: #ffffff;
      --red: #d70015;
      --red-soft: rgba(215, 0, 21, 0.12);
      --green: #1d9b3f;
      --green-soft: rgba(29, 155, 63, 0.15);
      --panel: rgba(246, 246, 246, 0.97);
      --field: rgba(0, 0, 0, 0.05);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --label: rgba(255, 255, 255, 0.92);
        --label-2: rgba(255, 255, 255, 0.55);
        --label-3: rgba(255, 255, 255, 0.35);
        --sep: rgba(255, 255, 255, 0.13);
        --hover: rgba(255, 255, 255, 0.10);
        --track: rgba(255, 255, 255, 0.15);
        --accent: #0a84ff;
        --red: #ff453a;
        --red-soft: rgba(255, 69, 58, 0.16);
        --green: #30d158;
        --green-soft: rgba(48, 209, 88, 0.18);
        --panel: rgba(40, 40, 42, 0.97);
        --field: rgba(255, 255, 255, 0.08);
      }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: transparent;
      color: var(--label);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      font-size: 13px;
      line-height: 1.3;
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Header */
    .header { display: flex; align-items: center; gap: 8px; padding: 8px 12px 6px; flex: 0 0 auto; }
    .title { font-weight: 600; }
    .status { margin-left: auto; max-width: 56%; font-size: 11px; color: var(--label-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: right; }

    /* Separator (hairline, inset like a native menu) */
    .sep { height: 1px; background: var(--sep); margin: 4px 12px; flex: 0 0 auto; }

    /* Scrollable account list */
    .content { flex: 1 1 auto; overflow-y: auto; }
    #cards { padding: 0; }

    .empty { padding: 26px 16px; text-align: center; color: var(--label-2); }
    .empty .sub { margin-top: 3px; font-size: 12px; color: var(--label-3); }

    /* One account (kept compact so several fit at once) */
    .acct { padding: 1px 0 2px; }
    .acct.active { box-shadow: inset 2px 0 0 var(--accent); }
    .acct-head { display: flex; align-items: center; gap: 7px; padding: 2px 10px 2px 12px; }
    .dot { flex: 0 0 auto; width: 7px; height: 7px; border-radius: 50%; }
    .dot.on { background: var(--green); }
    .dot.off { background: var(--label-3); }
    .email { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .email.off { color: var(--label-2); }
    .acct-actions { display: flex; gap: 1px; flex: 0 0 auto; }

    .ibtn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; padding: 0;
      border: none; border-radius: 5px; background: transparent;
      color: var(--label-2); cursor: default;
      transition: background 0.1s ease, color 0.1s ease;
    }
    .ibtn svg { width: 13px; height: 13px; }
    .ibtn:hover { background: var(--hover); color: var(--label); }
    .ibtn.danger:hover { background: var(--red-soft); color: var(--red); }
    .ibtn:disabled { opacity: 0.35; }

    /* Usage metrics (name + reset left, bold value right, thin bar) */
    .metrics { padding: 0 12px 3px; }
    .metric { margin-top: 4px; }
    .metric-top { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
    .metric-name { flex: 1; min-width: 0; font-size: 12px; color: var(--label-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .metric-reset { color: var(--label-3); }
    .metric-val { flex: 0 0 auto; font-size: 12px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .bar { height: 4px; margin-top: 3px; border-radius: 2px; background: var(--track); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; background: var(--accent); }
    .bar-fill.high { background: var(--red); }

    .phase { display: flex; align-items: center; gap: 7px; padding: 2px 12px; font-size: 12px; color: var(--label-2); }
    .noinfo { padding: 0 12px 2px; font-size: 12px; color: var(--label-3); }
    .hint { padding: 2px 12px; font-size: 11px; color: var(--accent); }
    .err { margin: 4px 12px; padding: 5px 8px; border-radius: 6px; background: var(--red-soft); color: var(--red); font-size: 11px; }

    details.raw { padding: 2px 12px 0; }
    .raw summary { font-size: 11px; color: var(--label-3); list-style: none; }
    .raw summary::-webkit-details-marker { display: none; }
    .raw summary:hover { color: var(--label-2); }
    .raw pre {
      margin: 5px 0 2px; padding: 7px; border-radius: 6px;
      background: var(--field);
      font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--label-2);
      white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow: auto;
      -webkit-user-select: text; user-select: text;
    }

    /* Top action menu items (native rounded highlight on hover) */
    .topbar { flex: 0 0 auto; padding: 2px 0; }
    .mitem {
      display: flex; align-items: center; gap: 8px;
      margin: 0 5px; padding: 5px 7px; border-radius: 5px;
      cursor: default;
    }
    .mitem svg { width: 15px; height: 15px; color: var(--label-2); }
    .mitem:hover { background: var(--accent); color: var(--on-accent); }
    .mitem:hover svg { color: var(--on-accent); }
    .mitem.is-busy { opacity: 0.55; }
    .mitem.is-busy:hover { background: transparent; color: var(--label); }
    .mitem.is-busy:hover svg { color: var(--label-2); }

    .auto-row { display: flex; align-items: center; gap: 8px; margin: 0 5px; padding: 4px 7px; font-size: 12px; color: var(--label-2); }
    .auto-row label { display: flex; align-items: center; gap: 5px; }
    .auto-row input[type="checkbox"] { width: 13px; height: 13px; margin: 0; accent-color: var(--accent); }
    .interval { display: inline-flex; align-items: center; gap: 4px; }
    .interval.is-off { opacity: 0.45; pointer-events: none; }
    .mins { width: 34px; height: 18px; padding: 0 3px; border: 1px solid var(--sep); border-radius: 4px; background: var(--field); color: var(--label); font-size: 11px; text-align: center; }
    .mins:focus { outline: 1.5px solid var(--accent); outline-offset: -1px; border-color: transparent; }

    /* Spinner */
    .spin { flex: 0 0 auto; width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; opacity: 0.7; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Sign-in sheet */
    .sheet-bg { position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center; padding: 14px; background: rgba(0, 0, 0, 0.18); }
    @media (prefers-color-scheme: dark) { .sheet-bg { background: rgba(0, 0, 0, 0.42); } }
    .sheet { position: relative; width: 100%; max-width: 300px; padding: 16px; border-radius: 12px; background: var(--panel); box-shadow: 0 12px 40px rgba(0, 0, 0, 0.32); }
    .sheet .close { position: absolute; top: 8px; right: 8px; }
    .sheet .badge { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; margin-bottom: 10px; border-radius: 8px; background: var(--field); color: var(--accent); }
    .sheet .badge svg { width: 18px; height: 18px; }
    .sheet h2 { margin: 0 0 2px; font-size: 15px; font-weight: 600; }
    .sheet .sub { margin: 0 0 12px; font-size: 12px; color: var(--label-2); }
    .prog { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .note { margin-top: 14px; font-size: 11px; line-height: 1.5; color: var(--label-3); }
    .urls { margin-top: 12px; }
    .urls .l { margin-bottom: 5px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--label-3); }
    .urls .list { display: flex; flex-direction: column; gap: 5px; }
    .urls a { font-size: 12px; color: var(--accent); text-decoration: none; word-break: break-all; -webkit-user-select: text; user-select: text; }
    .urls a:hover { text-decoration: underline; }
    .ok { display: flex; align-items: center; gap: 10px; }
    .ok .ic { display: flex; align-items: center; justify-content: center; flex: 0 0 auto; width: 34px; height: 34px; border-radius: 50%; background: var(--green-soft); color: var(--green); }
    .ok .ic svg { width: 18px; height: 18px; }
    .ok .t { font-weight: 600; color: var(--green); }
    .ok .e { font-size: 12px; color: var(--label-2); }

    .hidden { display: none !important; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--label-3); border-radius: 8px; border: 2px solid transparent; background-clip: content-box; }
    ::-webkit-scrollbar-thumb:hover { background: var(--label-2); }
    ::selection { background: var(--accent); color: var(--on-accent); }
  </style>
</head>
<body>

  <div class="header">
    <span class="title">Claude Usage</span>
    <span id="status" class="status"></span>
  </div>

  <div class="topbar">
    <div class="mitem" id="check-btn">
      <i data-lucide="refresh-cw"></i><span id="check-btn-text">Check usage</span>
    </div>
    <div class="mitem" id="add-btn">
      <i data-lucide="user-plus"></i>Add account…
    </div>
    <div class="auto-row">
      <label><input type="checkbox" id="auto-toggle">Auto-refresh</label>
      <span id="auto-interval-wrap" class="interval is-off">every
        <input type="text" id="auto-mins" inputmode="numeric" value="15" class="mins" aria-label="auto-refresh minutes"> min
      </span>
    </div>
  </div>
  <div class="sep"></div>

  <div class="content"><div id="cards"></div></div>

  <!-- Sign-in sheet -->
  <div id="login-modal" class="sheet-bg hidden">
    <div class="sheet">
      <button id="modal-close" class="ibtn close" title="Close"><i data-lucide="x"></i></button>
      <div class="badge"><i data-lucide="key-round"></i></div>
      <h2>Sign in to Claude</h2>
      <p id="modal-sub" class="sub">Adding a new account</p>

      <div id="modal-progress">
        <div class="prog"><span class="spin"></span><span id="modal-status">starting claude…</span></div>
        <div id="modal-urls" class="urls hidden">
          <div class="l">Browser didn’t open?</div>
          <div id="modal-url-list" class="list"></div>
        </div>
        <p class="note">
          Theme and sign-in method are chosen automatically. Finish signing in in the browser — this window closes by
          itself once the account is authenticated.
        </p>
      </div>

      <div id="modal-success" class="hidden">
        <div class="ok">
          <div class="ic"><i data-lucide="check"></i></div>
          <div>
            <div class="t">Signed in</div>
            <div id="modal-success-email" class="e"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/lucide.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
