name: Build & Release

# Build a release .dmg and publish a GitHub Release on every push to main.
on:
  push:
    branches: [main]

# Needed so the workflow can create tags, releases and upload assets.
permissions:
  contents: write

# If you push again while a build is running, cancel the older one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    # Put "[skip release]" in a commit message to skip a build.
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') }}
    runs-on: macos-latest   # required to produce a macOS .dmg
    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0   # full history so release notes can diff against the previous tag

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22   # a dependency requires Node >=22.12; 22 resolves to the latest 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute version (major.minor.<run_number>)
        id: ver
        run: |
          BASE=$(node -p "require('./package.json').version.split('.').slice(0,2).join('.')")
          VERSION="${BASE}.${{ github.run_number }}"
          npm pkg set version="$VERSION"   # only touches package.json; not committed
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building v$VERSION"

      - name: Compile TypeScript
        run: npm run build

      - name: Package macOS .dmg
        # No Apple Developer certificate in CI. mac.identity "-" (in package.json)
        # ad-hoc signs the whole bundle so macOS doesn't report the app as
        # "damaged"; users still clear quarantine once (see README) since an
        # ad-hoc signature isn't notarized for Gatekeeper.
        run: npx electron-builder --mac --publish never

      - name: Build release notes
        # A concise, human-readable changelog (what actually changed, from commit
        # subjects since the last release) + a stable install blurb — instead of
        # GitHub's auto notes, which just link out to the commits/PRs.
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$PREV_TAG" ]; then RANGE="${PREV_TAG}..HEAD"; else RANGE="HEAD~15..HEAD"; fi
          echo "Changelog range: $RANGE (prev tag: ${PREV_TAG:-none})"
          # Commit subjects → clean bullets: drop merges/bumps, strip conventional
          # prefixes (feat:/fix:/…), cap the list so it stays concise.
          CHANGES=$(git log "$RANGE" --no-merges --pretty=format:'%s' \
            | grep -vE '^(Merge |Bump version)' \
            | sed -E 's/^(feat|fix|chore|docs|refactor|perf|build|ci|test|style|revert)(\([^)]+\))?!?:[[:space:]]*//' \
            | sed -E 's/^/- /' \
            | head -n 20 || true)
          [ -z "$CHANGES" ] && CHANGES="- Maintenance and internal improvements"
          DMG="Claude Quota Monitor-${VERSION}-arm64.dmg"
          {
            echo "Native macOS menu-bar app for watching Claude Code usage quota across multiple accounts."
            echo
            echo "## What's new in v${VERSION}"
            echo "$CHANGES"
            echo
            echo "## Install"
            echo "1. Download **${DMG}** below (Apple Silicon / arm64)."
            echo "2. Open it and drag the app into **Applications**."
            echo "3. **First open:** macOS will block it (unsigned) — right-click the app → **Open → Open**. After that it opens normally."
            echo
            echo "A **gauge icon** appears in your menu bar (top-right) — there's no Dock icon. Requires the \`claude\` CLI installed."
          } > RELEASE_NOTES.md
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: dist-app/*.dmg
